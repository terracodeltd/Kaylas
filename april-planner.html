<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Planner</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#378ADD">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planner 2026">

<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f3f4f6;padding:1rem;color:#111}
:root{
  --bg-primary:#fff;--bg-secondary:#f3f4f6;--bg-info:#e6f1fb;--bg-success:#e1f5ee;
  --border-tertiary:rgba(0,0,0,0.12);--border-secondary:rgba(0,0,0,0.25);--border-info:#378ADD;--border-success:#1D9E75;
  --text-primary:#111;--text-secondary:#555;--text-tertiary:#999;--text-info:#0C447C;--text-success:#085041;
  --radius-md:8px;--radius-lg:12px
}
.pill{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.4;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.pill.work{background:#FFF3D6;color:#854F0B;border:0.5px solid #EF9F27}
.pill.work:hover{background:#FFE7A3}
.pill.exercise{background:#EAF3DE;color:#27500A;border:0.5px solid #639922}
.pill.exercise:hover{background:#C0DD97}
.pill.handytrack{background:#E1F5EE;color:#085041;border:0.5px solid #1D9E75}
.pill.handytrack:hover{background:#9FE1CB}
.pill.udemy{background:#E6F1FB;color:#0C447C;border:0.5px solid #378ADD}
.pill.udemy:hover{background:#B5D4F4}
.pill.home{background:#EEEDFE;color:#3C3489;border:0.5px solid #7F77DD}
.pill.home:hover{background:#D5D3F7}
.hdr{font-size:11px;font-weight:500;color:var(--text-secondary);text-align:center;padding:4px 0 8px}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
.view-btn{background:transparent;border:0.5px solid rgba(0,0,0,0.25);border-radius:8px;padding:5px 14px;font-size:13px;cursor:pointer;color:#111}
.view-btn.active{background:#f3f4f6;font-weight:500}
.nav-btn{background:transparent;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;width:28px;height:28px;cursor:pointer;color:#111;font-size:13px;display:inline-flex;align-items:center;justify-content:center}
.day-cell{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:6px;min-height:110px;position:relative}
.day-cell.empty-cell{background:transparent;border-color:transparent;min-height:0}
.day-cell.today-cell{border:1.5px solid #378ADD}
.day-num{font-size:12px;font-weight:500;color:#555;margin-bottom:4px}
.day-num.today-num{color:#0C447C;font-weight:700}
.wk-cell{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:8px;min-width:120px;flex:1;position:relative}
.wk-cell.today-cell{border:1.5px solid #378ADD}
.wk-cell.empty-cell{background:#f3f4f6;opacity:0.4;min-width:60px;flex:0.5}
.wk-day-hdr{font-size:11px;font-weight:500;color:#555;margin-bottom:6px;padding-bottom:5px;border-bottom:0.5px solid rgba(0,0,0,0.12)}
.wk-day-hdr span{display:block;font-size:16px;font-weight:500;color:#111;margin-top:1px}
.wk-day-hdr span.today-num{color:#0C447C;font-weight:700}
.add-pill-btn{font-size:9px;color:#999;cursor:pointer;border:1px dashed rgba(0,0,0,0.15);border-radius:4px;padding:1px 5px;margin-top:2px;display:inline-block;background:transparent}
.add-pill-btn:hover{color:#555;border-color:rgba(0,0,0,0.3);background:#f9f9f9}
.popup{position:absolute;z-index:50;background:#fff;border:0.5px solid rgba(0,0,0,0.25);border-radius:10px;padding:11px;width:240px;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.popup input,.popup textarea,.popup select{width:100%;margin-bottom:8px;font-size:12px;padding:6px 8px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;font-family:inherit}
.popup textarea{resize:vertical;min-height:60px}
.popup .plbl{font-size:11px;color:#555;margin-bottom:5px;display:block}
.popup .pact{display:flex;gap:6px}
.popup .pact button{flex:1;font-size:11px;padding:5px 0;cursor:pointer;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);background:transparent;color:#111}
.popup .pact button.psave{background:#e1f5ee;color:#085041;border-color:#1D9E75}
.popup .pact button.pdel{background:#fde8e8;color:#991b1b;border-color:#f87171}
.popup .pclear{font-size:10px;color:#999;cursor:pointer;text-align:right;margin-bottom:6px;display:block}
.popup .pclear:hover{color:#c00}
.stat-card{background:#f3f4f6;border-radius:8px;padding:10px 12px}
.stat-label{font-size:11px;color:#555;margin-bottom:2px}
.stat-val{font-size:20px;font-weight:500}
.stat-unit{font-size:11px;font-weight:400;color:#555}
/* Template modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:20px;width:95%;max-width:900px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:4px}
.modal p{font-size:12px;color:#555;margin-bottom:14px}
.tpl-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.tpl-col{background:#f9fafb;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:8px;min-height:160px}
.tpl-col-hdr{font-size:11px;font-weight:600;color:#555;text-align:center;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid rgba(0,0,0,0.1)}
.tpl-pill{font-size:10px;padding:3px 6px;border-radius:4px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.tpl-pill .tpl-x{cursor:pointer;opacity:0.5;font-size:12px;font-weight:700;flex-shrink:0}
.tpl-pill .tpl-x:hover{opacity:1;color:#c00}
.tpl-add{font-size:10px;color:#999;cursor:pointer;border:1px dashed rgba(0,0,0,0.15);border-radius:4px;padding:3px 6px;text-align:center;margin-top:4px}
.tpl-add:hover{color:#555;border-color:rgba(0,0,0,0.3);background:#fff}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal-actions button{padding:7px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.2);background:transparent;color:#111}
.modal-actions button.primary{background:#e1f5ee;color:#085041;border-color:#1D9E75;font-weight:500}
/* Add-pill popup */
.add-popup{position:absolute;z-index:50;background:#fff;border:0.5px solid rgba(0,0,0,0.25);border-radius:10px;padding:11px;width:220px;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.add-popup select,.add-popup input{width:100%;margin-bottom:8px;font-size:12px;padding:6px 8px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;font-family:inherit}
</style>
</head>
<body>
<div id="root" style="max-width:960px;margin:0 auto;padding:1rem 0">

<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px">
  <div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="nav-btn" onclick="changeMonth(-1)">←</button>
      <div id="month-title" style="font-size:20px;font-weight:500;min-width:160px;text-align:center"></div>
      <button class="nav-btn" onclick="changeMonth(1)">→</button>
    </div>
    <div style="font-size:12px;color:#555;margin-top:4px">Click any pill to edit &middot; <span style="cursor:pointer;color:#0C447C;text-decoration:underline" onclick="openTemplate()">Weekly Template</span></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 14px">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555"><span class="legend-dot" style="background:#FFF3D6;border:0.5px solid #EF9F27"></span>Work ✎</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555"><span class="legend-dot" style="background:#EAF3DE;border:0.5px solid #639922"></span>Exercise ✎</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555"><span class="legend-dot" style="background:#E1F5EE;border:0.5px solid #1D9E75"></span>HandyTrack ✎</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555"><span class="legend-dot" style="background:#E6F1FB;border:0.5px solid #378ADD"></span>Udemy ✎</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555"><span class="legend-dot" style="background:#EEEDFE;border:0.5px solid #7F77DD"></span>Home ✎</div>
  </div>
</div>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
  <div style="display:flex;gap:6px">
    <button class="view-btn active" id="btn-month" onclick="setView('month')">Month</button>
    <button class="view-btn" id="btn-week" onclick="setView('week')">Week</button>
    <button class="view-btn" id="btn-autofill" onclick="autoFillMonth()" title="Apply weekly template to empty days">Auto-fill</button>
  </div>
  <div id="week-nav" style="display:none;align-items:center;gap:8px">
    <button class="nav-btn" onclick="changeWeek(-1)">←</button>
    <span id="week-label" style="font-size:13px;color:#555;min-width:90px;text-align:center"></span>
    <button class="nav-btn" onclick="changeWeek(1)">→</button>
  </div>
</div>

<div id="day-hdrs" style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-bottom:4px">
  <div class="hdr">Sun</div><div class="hdr">Mon</div><div class="hdr">Tue</div><div class="hdr">Wed</div><div class="hdr">Thu</div><div class="hdr">Fri</div><div class="hdr">Sat</div>
</div>
<div id="cal-area"></div>
<div id="stats-area" style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-top:16px"></div>
</div>

<script>
/* ── Constants ── */
const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const PILL_TYPES=['work','exercise','handytrack','udemy','home'];
const PILL_COLORS={work:'#FFF3D6',exercise:'#EAF3DE',handytrack:'#E1F5EE',udemy:'#E6F1FB',home:'#EEEDFE'};
const PILL_LABELS={work:'Work details',exercise:'Exercise detail',handytrack:'HandyTrack tasks',udemy:'Udemy course/topic',home:'Home task details'};
const PILL_PLACEHOLDERS={work:'e.g. Work 08:30–19:00',exercise:'e.g. 3×10 squats @ 60kg',handytrack:'e.g. Job card UI, payment flow...',udemy:'e.g. React Native – The Practical Guide',home:'e.g. Laundry, house clean 09–11'};
const PILL_NAMES={work:'Work',exercise:'Exercise',handytrack:'HandyTrack',udemy:'Udemy',home:'Home'};

/* ── April 2026 seed data ── */
const APRIL_SEED=[
  {d:1,pills:[{t:'handytrack',l:'HandyTrack 09–12',detail:''},{t:'home',l:'Laundry (on while working)',detail:''},{t:'udemy',l:'Udemy 14–16',detail:''}]},
  {d:2,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'udemy',l:'Udemy 19:30–21',detail:''}]},
  {d:3,pills:[{t:'exercise',l:'Type A: Bike 30 min',detail:''},{t:'handytrack',l:'HandyTrack 14–17',detail:''}]},
  {d:4,pills:[{t:'home',l:'House clean 09–11',detail:''},{t:'home',l:'Laundry (on while cleaning)',detail:''},{t:'handytrack',l:'HandyTrack 11–14',detail:''},{t:'udemy',l:'Udemy 15–17',detail:''}]},
  {d:5,pills:[{t:'handytrack',l:'HandyTrack 09–13',detail:''},{t:'exercise',l:'Freedom Field 13:30–14:30',detail:''},{t:'exercise',l:'Type B: Resistance',detail:''},{t:'udemy',l:'Udemy 15–17',detail:''}]},
  {d:6,pills:[{t:'home',l:'Laundry (on while working)',detail:''},{t:'handytrack',l:'HandyTrack 09–13',detail:''},{t:'udemy',l:'Udemy 14–16',detail:''}]},
  {d:7,pills:[{t:'exercise',l:'Type A: Bike 35 min',detail:''},{t:'handytrack',l:'HandyTrack 10–13',detail:''},{t:'udemy',l:'Udemy 19:30–21',detail:''}]},
  {d:8,pills:[{t:'exercise',l:'Type C: Rest',detail:''},{t:'handytrack',l:'HandyTrack 09–12',detail:''},{t:'udemy',l:'Udemy 14–16',detail:''}]},
  {d:9,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'handytrack',l:'HandyTrack 19:30–21',detail:''}]},
  {d:10,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'udemy',l:'Udemy 19:30–21',detail:''}]},
  {d:11,pills:[{t:'home',l:'House clean 09–11',detail:''},{t:'home',l:'Laundry (on while cleaning)',detail:''},{t:'exercise',l:'Type B: Resistance',detail:''},{t:'handytrack',l:'HandyTrack 13–16',detail:''}]},
  {d:12,pills:[{t:'handytrack',l:'HandyTrack 09–13',detail:''},{t:'udemy',l:'Udemy 15–17',detail:''}]},
  {d:13,pills:[{t:'work',l:'Study day 08:30–16:30',detail:''},{t:'exercise',l:'Type A: Bike 35 min',detail:''},{t:'handytrack',l:'HandyTrack 19:30–21',detail:''}]},
  {d:14,pills:[{t:'exercise',l:'Type C: Walk/Recovery',detail:''},{t:'home',l:'Laundry (on while working)',detail:''},{t:'handytrack',l:'HandyTrack 10–13',detail:''},{t:'udemy',l:'Udemy 19:30–21',detail:''}]},
  {d:15,pills:[{t:'exercise',l:'Type B: +weight',detail:''},{t:'handytrack',l:'HandyTrack 09–12',detail:''},{t:'udemy',l:'Udemy 14–16',detail:''}]},
  {d:16,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'handytrack',l:'HandyTrack 19:30–21',detail:''}]},
  {d:17,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'udemy',l:'Udemy 19:30–21',detail:''}]},
  {d:18,pills:[{t:'home',l:'House clean 09–11',detail:''},{t:'home',l:'Laundry (on while cleaning)',detail:''},{t:'exercise',l:'Type A: Bike 40 min',detail:''},{t:'handytrack',l:'HandyTrack 13–16',detail:''}]},
  {d:19,pills:[{t:'handytrack',l:'HandyTrack 09–13',detail:''},{t:'exercise',l:'Freedom Field 13:30–14:30',detail:''},{t:'exercise',l:'Type C: 45 min walk',detail:''},{t:'udemy',l:'Udemy 15:30–17',detail:''}]},
  {d:20,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'handytrack',l:'HandyTrack 19:30–21',detail:''}]},
  {d:21,pills:[{t:'exercise',l:'Type B: Squat & row',detail:''},{t:'home',l:'Laundry (on while working)',detail:''},{t:'udemy',l:'Udemy 10–12',detail:''},{t:'handytrack',l:'HandyTrack 13–16',detail:''}]},
  {d:22,pills:[{t:'exercise',l:'Type A: Row 30 min',detail:''},{t:'handytrack',l:'HandyTrack 09–12',detail:''},{t:'udemy',l:'Udemy 14–16',detail:''}]},
  {d:23,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'handytrack',l:'HandyTrack 19:30–21',detail:''}]},
  {d:24,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'udemy',l:'Udemy 19:30–21',detail:''}]},
  {d:25,pills:[{t:'home',l:'House clean 09–11',detail:''},{t:'home',l:'Laundry (on while cleaning)',detail:''},{t:'handytrack',l:'HandyTrack 11–14',detail:''},{t:'udemy',l:'Udemy 15–17',detail:''}]},
  {d:26,pills:[{t:'handytrack',l:'HandyTrack 09–13',detail:''},{t:'exercise',l:'Freedom Field 13:30–14:30',detail:''},{t:'exercise',l:'Type B: Cable face pulls',detail:''},{t:'udemy',l:'Udemy 15:30–17',detail:''}]},
  {d:27,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'handytrack',l:'HandyTrack 19:30–21',detail:''}]},
  {d:28,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'home',l:'Laundry (on before work)',detail:''},{t:'udemy',l:'Udemy 19:30–21',detail:''}]},
  {d:29,pills:[{t:'exercise',l:'Type A: Bike/row 40 min',detail:''},{t:'handytrack',l:'HandyTrack 09–12',detail:''},{t:'udemy',l:'Udemy 14–16',detail:''}]},
  {d:30,pills:[{t:'work',l:'Work 08:30–19:00',detail:''},{t:'handytrack',l:'HandyTrack 19:30–21',detail:''}]},
];

/* ── Default weekly template (extracted from April patterns) ── */
const DEFAULT_TEMPLATE=[
  /* Sun */ [{t:'exercise',l:'Type A: Cardio'},{t:'handytrack',l:'HandyTrack 10–13'},{t:'udemy',l:'Udemy 19:30–21'}],
  /* Mon */ [{t:'work',l:'Work 08:30–19:00'},{t:'handytrack',l:'HandyTrack 19:30–21'}],
  /* Tue */ [{t:'exercise',l:'Type B: Resistance'},{t:'home',l:'Laundry'},{t:'udemy',l:'Udemy 10–12'},{t:'handytrack',l:'HandyTrack 13–16'}],
  /* Wed */ [{t:'exercise',l:'Type A: Cardio'},{t:'handytrack',l:'HandyTrack 09–12'},{t:'udemy',l:'Udemy 14–16'}],
  /* Thu */ [{t:'work',l:'Work 08:30–19:00'},{t:'udemy',l:'Udemy 19:30–21'}],
  /* Fri */ [{t:'work',l:'Work 08:30–19:00'},{t:'handytrack',l:'HandyTrack 19:30–21'}],
  /* Sat */ [{t:'home',l:'House clean 09–11'},{t:'home',l:'Laundry'},{t:'handytrack',l:'HandyTrack 11–14'},{t:'udemy',l:'Udemy 15–17'}],
];

/* ── State ── */
let store=loadStore();
let currentYear=2026,currentMonth=3; // 0-indexed (3=April)
let currentView='month',currentWeek=0,activePopup=null;

/* ── Persistence ── */
function loadStore(){
  try{
    const raw=localStorage.getItem('planner-data');
    if(raw){const d=JSON.parse(raw);if(d.months&&d.template)return d;}
  }catch(e){}
  return{months:{'2026-04':JSON.parse(JSON.stringify(APRIL_SEED))},template:JSON.parse(JSON.stringify(DEFAULT_TEMPLATE))};
}
function saveStore(){localStorage.setItem('planner-data',JSON.stringify(store));}

/* ── Helpers ── */
function monthKey(y,m){return y+'-'+String(m+1).padStart(2,'0');}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function firstDayOfWeek(y,m){return new Date(y,m,1).getDay();}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d;}
function getMonthData(y,m){
  const key=monthKey(y,m);
  if(!store.months[key]){
    const n=daysInMonth(y,m);
    store.months[key]=[];
    for(let i=1;i<=n;i++)store.months[key].push({d:i,pills:[]});
    saveStore();
  }
  return store.months[key];
}
function computeWeeks(y,m){
  const days=getMonthData(y,m);
  const first=firstDayOfWeek(y,m);
  const total=daysInMonth(y,m);
  const weeks=[];
  let week=new Array(7).fill(null);
  let dow=first;
  for(let i=0;i<total;i++){
    week[dow]=i;
    if(dow===6||i===total-1){
      const start=i-dow+first===first?1:days[week.find(x=>x!==null)].d;
      const end=days[i].d;
      weeks.push({label:MONTH_NAMES[m].slice(0,3)+' '+start+'–'+end,cols:[...week]});
      week=new Array(7).fill(null);
      dow=0;
    }else{dow++;}
  }
  return weeks;
}

/* ── Popup system ── */
function closePopup(){if(activePopup){activePopup.remove();activePopup=null;}}

function openEditPopup(pillEl,monthData,dayIdx,pillIdx){
  closePopup();
  const pill=monthData[dayIdx].pills[pillIdx];
  const popup=document.createElement('div');popup.className='popup';
  const lbl=document.createElement('span');lbl.className='plbl';lbl.textContent=PILL_LABELS[pill.t]||'Detail';popup.appendChild(lbl);

  // Label input
  const lblInp=document.createElement('input');
  lblInp.value=pill.l;lblInp.placeholder='Label (e.g. Work 09–17)';
  lblInp.style.marginBottom='6px';popup.appendChild(lblInp);

  // Detail input
  const detLbl=document.createElement('span');detLbl.className='plbl';detLbl.textContent='Notes';detLbl.style.marginTop='4px';popup.appendChild(detLbl);
  let inp;
  if(pill.t==='handytrack'){inp=document.createElement('textarea');inp.rows=3;}else{inp=document.createElement('input');}
  inp.value=pill.detail||'';inp.placeholder=PILL_PLACEHOLDERS[pill.t]||'';popup.appendChild(inp);

  if(pill.detail){const clr=document.createElement('span');clr.className='pclear';clr.textContent='Clear notes';clr.onclick=e=>{e.stopPropagation();pill.detail='';inp.value='';};popup.appendChild(clr);}

  const acts=document.createElement('div');acts.className='pact';
  const del=document.createElement('button');del.className='pdel';del.textContent='Delete';
  del.onclick=e=>{e.stopPropagation();monthData[dayIdx].pills.splice(pillIdx,1);saveStore();closePopup();render();};
  const cancel=document.createElement('button');cancel.textContent='Cancel';cancel.onclick=e=>{e.stopPropagation();closePopup();};
  const save=document.createElement('button');save.className='psave';save.textContent='Save';
  save.onclick=e=>{e.stopPropagation();pill.l=lblInp.value.trim()||pill.l;pill.detail=inp.value.trim();saveStore();closePopup();render();};

  inp.onkeydown=e=>{if(pill.t!=='handytrack'&&e.key==='Enter')save.click();if(e.key==='Escape')cancel.click();e.stopPropagation();};
  lblInp.onkeydown=e=>{if(e.key==='Enter'){inp.focus();e.preventDefault();}if(e.key==='Escape')cancel.click();e.stopPropagation();};

  acts.append(del,cancel,save);popup.appendChild(acts);
  positionPopup(popup,pillEl);
  setTimeout(()=>lblInp.focus(),0);
}

function openAddPopup(btnEl,monthData,dayIdx){
  closePopup();
  const popup=document.createElement('div');popup.className='add-popup';

  const sel=document.createElement('select');
  PILL_TYPES.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=PILL_NAMES[t];sel.appendChild(o);});
  popup.appendChild(sel);

  const lblInp=document.createElement('input');lblInp.placeholder='Label (e.g. Work 09–17)';popup.appendChild(lblInp);

  // Auto-fill label on type change
  sel.onchange=()=>{if(!lblInp.value)lblInp.placeholder=PILL_PLACEHOLDERS[sel.value]||'Label';};

  const acts=document.createElement('div');acts.className='pact';
  const cancel=document.createElement('button');cancel.textContent='Cancel';cancel.onclick=e=>{e.stopPropagation();closePopup();};
  const add=document.createElement('button');add.className='psave';add.textContent='Add';
  add.onclick=e=>{
    e.stopPropagation();
    const t=sel.value;
    const l=lblInp.value.trim()||PILL_NAMES[t];
    monthData[dayIdx].pills.push({t,l,detail:''});
    saveStore();closePopup();render();
  };
  lblInp.onkeydown=e=>{if(e.key==='Enter')add.click();if(e.key==='Escape')cancel.click();e.stopPropagation();};
  acts.append(cancel,add);popup.appendChild(acts);
  positionPopup(popup,btnEl);
  setTimeout(()=>lblInp.focus(),0);
}

function positionPopup(popup,refEl){
  const cell=refEl.closest('[data-cell]');
  const cellRect=cell.getBoundingClientRect();const refRect=refEl.getBoundingClientRect();
  const rootRect=document.getElementById('root').getBoundingClientRect();
  let top=refRect.bottom-cellRect.top+4;let left=refRect.left-cellRect.left;
  const maxLeft=rootRect.width-248;if(left>maxLeft)left=maxLeft;if(left<0)left=0;
  popup.style.top=top+'px';popup.style.left=left+'px';
  cell.appendChild(popup);activePopup=popup;
}

/* ── Pill rendering ── */
function makePillEl(pill,monthData,dayIdx,pillIdx){
  const el=document.createElement('span');el.className='pill '+pill.t;
  if(pill.detail){
    const firstLine=pill.detail.split('\n')[0];
    const extra=pill.detail.split('\n').filter(l=>l.trim()).length-1;
    el.textContent=firstLine+(extra>0?' +'+extra+' more':'');
    el.title=pill.l+'\n'+pill.detail;
  }else{
    el.textContent=pill.l;
    el.title='Click to edit';
  }
  el.addEventListener('click',e=>{e.stopPropagation();openEditPopup(el,monthData,dayIdx,pillIdx);});
  return el;
}

/* ── Render ── */
function render(){
  closePopup();
  currentView==='month'?renderMonth():renderWeek();
  renderStats();
  document.getElementById('month-title').textContent=MONTH_NAMES[currentMonth]+' '+currentYear;
  document.title=MONTH_NAMES[currentMonth]+' '+currentYear+' Planner';
}

function renderMonth(){
  const area=document.getElementById('cal-area');area.innerHTML='';
  const monthData=getMonthData(currentYear,currentMonth);
  const first=firstDayOfWeek(currentYear,currentMonth);
  const total=daysInMonth(currentYear,currentMonth);

  const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px';

  // Leading empties
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day-cell empty-cell';grid.appendChild(e);}

  for(let di=0;di<total;di++){
    const day=monthData[di];
    const today=isToday(currentYear,currentMonth,di+1);
    const cell=document.createElement('div');
    cell.className='day-cell'+(today?' today-cell':'');cell.setAttribute('data-cell','1');
    const num=document.createElement('div');num.className='day-num'+(today?' today-num':'');num.textContent=day.d;
    cell.appendChild(num);
    day.pills.forEach((p,pi)=>cell.appendChild(makePillEl(p,monthData,di,pi)));

    // Add pill button
    const addBtn=document.createElement('span');addBtn.className='add-pill-btn';addBtn.textContent='+ add';
    addBtn.addEventListener('click',e=>{e.stopPropagation();openAddPopup(addBtn,monthData,di);});
    cell.appendChild(addBtn);
    grid.appendChild(cell);
  }

  // Trailing empties
  const trailing=(7-((first+total)%7))%7;
  for(let i=0;i<trailing;i++){const e=document.createElement('div');e.className='day-cell empty-cell';grid.appendChild(e);}

  area.appendChild(grid);document.getElementById('day-hdrs').style.display='grid';
}

function renderWeek(){
  const area=document.getElementById('cal-area');area.innerHTML='';
  document.getElementById('day-hdrs').style.display='none';
  const monthData=getMonthData(currentYear,currentMonth);
  const weeks=computeWeeks(currentYear,currentMonth);
  if(currentWeek>=weeks.length)currentWeek=weeks.length-1;
  if(currentWeek<0)currentWeek=0;
  document.getElementById('week-label').textContent=weeks[currentWeek].label;

  const wrap=document.createElement('div');wrap.style.cssText='display:flex;gap:4px;overflow-x:auto;padding-bottom:4px';
  weeks[currentWeek].cols.forEach((dayIdx,colI)=>{
    if(dayIdx===null){
      const e=document.createElement('div');e.className='wk-cell empty-cell';
      const h=document.createElement('div');h.className='wk-day-hdr';h.textContent=DAY_NAMES[colI];e.appendChild(h);wrap.appendChild(e);return;
    }
    const day=monthData[dayIdx];
    const today=isToday(currentYear,currentMonth,dayIdx+1);
    const cell=document.createElement('div');
    cell.className='wk-cell'+(today?' today-cell':'');cell.setAttribute('data-cell','1');
    const hdr=document.createElement('div');hdr.className='wk-day-hdr';
    const dn=document.createElement('span');dn.style.cssText='font-size:11px;font-weight:500;color:#555;display:block';dn.textContent=DAY_NAMES[colI];
    const dt=document.createElement('span');if(today)dt.className='today-num';dt.textContent=day.d;
    hdr.appendChild(dn);hdr.appendChild(dt);cell.appendChild(hdr);
    day.pills.forEach((p,pi)=>cell.appendChild(makePillEl(p,monthData,dayIdx,pi)));

    const addBtn=document.createElement('span');addBtn.className='add-pill-btn';addBtn.textContent='+ add';
    addBtn.addEventListener('click',e=>{e.stopPropagation();openAddPopup(addBtn,monthData,dayIdx);});
    cell.appendChild(addBtn);
    wrap.appendChild(cell);
  });
  area.appendChild(wrap);
}

function renderStats(){
  const monthData=getMonthData(currentYear,currentMonth);
  const counts={work:0,exercise:0,handytrack:0,udemy:0,home:0};
  const hours={handytrack:0,udemy:0};
  monthData.forEach(day=>{
    day.pills.forEach(p=>{
      counts[p.t]=(counts[p.t]||0)+1;
      // Estimate hours from time ranges like "09–13" or "19:30–21"
      const m=p.l.match(/(\d{1,2}):?(\d{2})?\s*[–-]\s*(\d{1,2}):?(\d{2})?/);
      if(m&&(p.t==='handytrack'||p.t==='udemy')){
        const s=parseInt(m[1])+(parseInt(m[2]||0)/60);
        const e=parseInt(m[3])+(parseInt(m[4]||0)/60);
        if(e>s)hours[p.t]+=e-s;
      }
    });
  });
  const sa=document.getElementById('stats-area');sa.innerHTML='';
  const stats=[
    {label:'Work/study',val:counts.work,unit:'days'},
    {label:'Exercise',val:counts.exercise,unit:'sessions'},
    {label:'HandyTrack',val:hours.handytrack?'~'+Math.round(hours.handytrack):counts.handytrack,unit:hours.handytrack?'hrs':'sessions'},
    {label:'Udemy',val:hours.udemy?'~'+Math.round(hours.udemy):counts.udemy,unit:hours.udemy?'hrs':'sessions'},
    {label:'Home tasks',val:counts.home,unit:'slots'},
  ];
  stats.forEach(s=>{
    const d=document.createElement('div');d.className='stat-card';
    d.innerHTML='<div class="stat-label">'+s.label+'</div><div class="stat-val">'+s.val+' <span class="stat-unit">'+s.unit+'</span></div>';
    sa.appendChild(d);
  });
}

/* ── Navigation ── */
function setView(v){
  currentView=v;currentWeek=0;
  document.getElementById('btn-month').classList.toggle('active',v==='month');
  document.getElementById('btn-week').classList.toggle('active',v==='week');
  document.getElementById('week-nav').style.display=v==='week'?'flex':'none';
  render();
}
function changeWeek(dir){
  const weeks=computeWeeks(currentYear,currentMonth);
  const n=currentWeek+dir;if(n<0||n>=weeks.length)return;currentWeek=n;closePopup();renderWeek();
}
function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  currentWeek=0;render();
}

/* ── Auto-fill from template ── */
function autoFillMonth(){
  const monthData=getMonthData(currentYear,currentMonth);
  let added=0;
  monthData.forEach((day,i)=>{
    const dow=new Date(currentYear,currentMonth,day.d).getDay();
    const tplDay=store.template[dow]||[];
    tplDay.forEach(tplPill=>{
      // Only add if no pill of same type+label exists
      const exists=day.pills.some(p=>p.t===tplPill.t&&p.l===tplPill.l);
      if(!exists){
        day.pills.push({t:tplPill.t,l:tplPill.l,detail:''});
        added++;
      }
    });
  });
  saveStore();render();
  if(added===0)alert('Template already applied — all template pills are present.');
}

/* ── Template editor ── */
function openTemplate(){
  closePopup();
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});

  const modal=document.createElement('div');modal.className='modal';
  modal.innerHTML='<h2>Weekly Template</h2><p>Define your ideal recurring week. Use "Auto-fill" to apply it to any month.</p>';

  const grid=document.createElement('div');grid.className='tpl-grid';
  const tpl=store.template;

  DAY_NAMES.forEach((name,dow)=>{
    const col=document.createElement('div');col.className='tpl-col';
    const hdr=document.createElement('div');hdr.className='tpl-col-hdr';hdr.textContent=name;col.appendChild(hdr);

    function renderCol(){
      // Clear pills
      col.querySelectorAll('.tpl-pill,.tpl-add').forEach(el=>el.remove());
      (tpl[dow]||[]).forEach((pill,pi)=>{
        const row=document.createElement('div');row.className='tpl-pill pill '+pill.t;
        const txt=document.createElement('span');txt.textContent=pill.l;txt.style.cssText='overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;cursor:pointer';
        txt.title='Click to edit label';
        txt.onclick=()=>{
          const newL=prompt('Edit label:',pill.l);
          if(newL!==null&&newL.trim()){pill.l=newL.trim();saveStore();renderCol();}
        };
        const x=document.createElement('span');x.className='tpl-x';x.textContent='×';
        x.onclick=()=>{tpl[dow].splice(pi,1);saveStore();renderCol();};
        row.append(txt,x);col.appendChild(row);
      });

      const addBtn=document.createElement('div');addBtn.className='tpl-add';addBtn.textContent='+ add';
      addBtn.onclick=()=>{
        // Inline type picker
        const pick=document.createElement('div');pick.style.cssText='margin-top:4px';
        PILL_TYPES.forEach(t=>{
          const b=document.createElement('span');b.className='pill '+t;b.textContent=PILL_NAMES[t];
          b.style.cssText='cursor:pointer;display:inline-block;margin:1px';
          b.onclick=()=>{
            const lbl=prompt(PILL_NAMES[t]+' label:',PILL_PLACEHOLDERS[t]);
            if(lbl&&lbl.trim()){
              if(!tpl[dow])tpl[dow]=[];
              tpl[dow].push({t,l:lbl.trim()});
              saveStore();renderCol();
            }else{pick.remove();}
          };
          pick.appendChild(b);
        });
        col.appendChild(pick);
      };
      col.appendChild(addBtn);
    }
    renderCol();
    grid.appendChild(col);
  });
  modal.appendChild(grid);

  const actions=document.createElement('div');actions.className='modal-actions';
  const resetBtn=document.createElement('button');resetBtn.textContent='Reset to default';
  resetBtn.onclick=()=>{store.template=JSON.parse(JSON.stringify(DEFAULT_TEMPLATE));saveStore();overlay.remove();openTemplate();};
  const closeBtn=document.createElement('button');closeBtn.className='primary';closeBtn.textContent='Done';
  closeBtn.onclick=()=>overlay.remove();
  actions.append(resetBtn,closeBtn);modal.appendChild(actions);

  overlay.appendChild(modal);document.body.appendChild(overlay);
}

/* ── Init ── */
document.addEventListener('click',e=>{if(activePopup&&!activePopup.contains(e.target))closePopup();});
render();
</script>

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
